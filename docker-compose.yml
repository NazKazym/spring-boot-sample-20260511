
version: '3.8'

services:

  postgres:

    image: postgres:15

    env_file: .env

    ports:

      - "5432:5432"

    volumes:

      - pg-data:/var/lib/postgresql/data

  auth-api:

    build: ./auth-api

    ports:

      - "8080:8080"

    env_file: .env

    depends_on:

      - postgres

  data-api:

    build: ./data-api

    ports:

      - "8081:8081"

    env_file: .env

    depends_on:

      - postgres

volumes:

  pg-data:

