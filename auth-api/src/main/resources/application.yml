server:
  port: 8080

spring:
  datasource:
    # Uses the service name defined in docker-compose.yml
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Automatically creates/updates the 'users' table found in image_9c723e.png
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    com.example.auth: DEBUG
    # Helpful for debugging the 401 issue seen in image_9c7d65.png
    org.springframework.security: DEBUG